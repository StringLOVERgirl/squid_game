<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <style>
      video {
        height: 100%;
        width: 100vw;
        object-fit: contain;
        padding: 0;
        margin: 0;
      }
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: raleway;
      }
      #app{
        /* border: solid 1px red; */
        background: linear-gradient(transparent, black), url(./bg2.jpg) center top / cover;
      }
      .videocont {
        display: grid;
        place-content: center;
        position: relative;
      }

      .state_cont{
        position: absolute;
        bottom: 0;
        transform: translateY(3px);
        --state: 0%;
        height: 13px;
        transition: width 1s;
        width: var(--state);
        position: absolute;
        filter: blur(3px);
        background: linear-gradient(
          #f44786, transparent)
          ; 
          
      }

      .figures {
        height: 100vh;
        width: 100%;
        position: absolute;
        transform: scale(0.9);
      }
      .figure {
        height: 30vh;
         /* / */
        aspect-ratio: 1/1;
        position: absolute;
        margin-inline: 8vh;
        filter: blur(3px);
        /* border: solid 2px #f44786; */
      }

      .circle {

        bottom: -50%;
        margin-inline: auto;
        transform: scale(0.4);
        
        border-radius: 50%;
        bottom: -50%;
        box-shadow:  0 0 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        /* box-shadow:  0 0 30px #f44786 inset, 5px -3px 30px #f44786;   */      
        animation: square linear infinite 3s;
      }
      .circle, .triangle{
        border: unset;
        right: 0;
      }
      .square {
        right: 0;
        top: 57%;
        /* top: 10vh; */
        animation: square linear infinite 3s;
        transform: translate(0, -50%);
        box-shadow:  0 0 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        /* // первое число размыавает второе границу рисусет ширну */
      }
      @keyframes square {
        from {
          box-shadow:  0 0 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        }
        25% {
          box-shadow:  2px 2px 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        }
        50% {
          box-shadow:  -2px 2px 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        }
        70% {
          box-shadow: -2px -2px 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        }
          to {
          box-shadow:  0px 0px 10px 7px #f44786, inset 0 0 10px 5px #f44786 ;
        }
      }
          @keyframes triangle {
        from {
          filter: drop-shadow(0 0 1px #f44786) blur(3px);
          /* box-shadow:  0 0 10px 7px #f44786, inset 0 0 10px 5px #f44786 ; */
        }
        5% {
          filter: drop-shadow( 2px 2px 1px #f44786) blur(3px);
        }
        10% {
          filter: drop-shadow(  -2px 2px 1px #f44786) blur(3px);
        }
        15% {
          filter: drop-shadow( -2px -2px 1px #f44786) blur(3px);
        }
        20% {
          filter: drop-shadow(  0px 0px 70px #f44786) blur(3px);
        }
        30% {
           filter: drop-shadow(  0px 0px 1px #f44786) blur(3px);
        }
        to {
          filter: drop-shadow(  0px 0px 0px #f44786) blur(3px);
        }
      }
      .triangle {
        top: 10vh;
        background: url(./triangle-4091.svg) center / cover;
        /* filter: drop-shadow(10px 10px 20px red); */
        /* clip-path: polygon(50% 0, 0% 100%, 10% 95%, 50% 10%, 50% 10%, 90% 95%, 6% 95%, 0 100%, 100% 100%, 50% 0); */
        transform: scale(1.1);
        animation: triangle linear infinite 15s ;
      }
      .triangle .circle {
        top: -40%;
        animation: unset;
        box-shadow:  0 0 10px 7px antiquewhite, inset 0 0 10px 5px antiquewhite;
      }

      @keyframes cube-rotate {
  from {
    transform: perspective(600px) rotate3d(0.6, 0.05, 0.2, 0deg);
  }

  to {
    transform: perspective(600px) rotate3d(0.6, 0.05, 0.2, 20deg);
  }
}
      .title_cont {
  
        position: absolute;
        color: white;
        isolation: isolate;
        /* border: solid 1px white; */
        display: grid;
        place-content: center;
        top: -0.5em;
        /* margin: 2em; */
        padding: 0.5em;
        animation: cube-rotate 2s ease-out infinite alternate;
        /* opacity: 0.4; */
      }

            @keyframes shimmer {
  from {
    filter: contrast(190%) brightness(500%);
    opacity: 0;
  }

  to {
    filter: contrast(190%) brightness(130%) ;
    /* opacity: 1; */
  }}

      .title {
        font-family: dm sans;
      font-size:2.3em;
      line-height: 1;
  width: 100%;
  height: 100%;
  padding: 8px;
  background: linear-gradient(24deg, rgba(50 0 255/10%), rgb(100, 237, 180)), url("data:image/svg+xml,%3Csvg viewBox='0 0 400 310' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  background-clip: text;
  -webkit-background-clip: text;
	color: transparent;
  animation-duration: 2s;
  animation-name: shimmer;
  animation-iteration-count: infinite;
  animation-direction: alternate;
}
      

      .title_bg {
      /* font-family: dm sans;
      font-size:1.5em; */
      position: absolute;
  width: 100%;
  height: 100%;
  /* opacity: 0.1; */
  /* background: antiquewhite; */
  mix-blend-mode: multiply;

      }
      @media (max-width: 600px) and (orientation: portrait){
        .videocont {
          display: block;
        }
        .app {
          height: 100svh;
          width: 100vw;
        }
        .figures {
          top: 5vh;
          right: -2em;
          height: 10vh;
          transform: scale(1);
        }
        .figure {
          height: 5vh;
          filter: blur(2px);
        }
        .square {
          top: 90%;
          animation: unset;
          box-shadow:  0 0 7px 3px #f44786, inset 0 0 7px 2px #f44786 ;
        }
        .circle {
          transform: scale(40%);
        }
        .triangle {
          top: 5%;
        }
      }
      @media (min-width: 1000px) and (max-width: 1100px){
        .figures
        {
          transform: scale(0.7);
          left: 11em;
        }
      }
      @media (min-width: 1400px) and (max-width: 1500px){
        #app {
          width: 90vw;
          margin-inline: auto;
          position: relative;
        }
        .videocont {
          display: block;
        }
        video {
          width: 
            80%
          }
        .figures {
          left: 10%;
          transform: scale(0.75);
        }
      }
      @media (min-width: 1600px){
        #app {
          width: 80vw;
          margin-inline: auto;
          position: relative;
        }
        .videocont {
          display: block;
        }
        video {
          width: 
            80%
          }
        .figures {
          left: 10%;
          transform: scale(0.75);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="videocont">
        <div class="figures">
          
          <div class="square figure">
            <div class="circle figure"></div>
          </div>
          <div class="triangle figure">
            <div class="circle figure circle2"></div>
          </div>
        </div>
        <div class="state_cont">
          <div class="state"></div>
        </div>
        <audio src="./Камин - EMIN & JONY ( Slowed Reverb - Deep Version ).mp3"></audio>
        <video src="Player 456.mp4" ></video>
      </div>
      <div class="title_cont">
        <div class="title">squid <br> game</div>
        <div class="title_bg"></div>
      </div>
    </div>
    <script type="module">
      // document.addEventListener('DOMContentLoaded',()=>{
      let video = document.getElementsByTagName('video')[0]
      let audio = document.getElementsByTagName('audio')[0]
      let state = document.querySelector('.state_cont')
      console.log(123)

        } else {
          if (video.paused) {video.play()} else {video.pause()}
        }
        
      }

      function stateupdtate(){
        // console.log(code=='Space')
        let actual = video.currentTime/video.duration*100
        console.log(actual)
        state.style.setProperty('--state', actual+'%')
      }
    // })
      console.log()
    </script>
  </body>
</html>
